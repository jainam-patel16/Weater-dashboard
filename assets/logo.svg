<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="bgGlow" cx="32%" cy="18%" r="85%">
      <stop offset="0%" stop-color="#1c2750"/>
      <stop offset="55%" stop-color="#0d1224"/>
      <stop offset="100%" stop-color="#07090f"/>
    </radialGradient>

    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff3cf"/>
      <stop offset="100%" stop-color="#ffd166"/>
    </linearGradient>

    <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dfe6f5"/>
      <stop offset="100%" stop-color="#a9c0ff"/>
    </linearGradient>

    <linearGradient id="auroraGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0"/>
      <stop offset="22%" stop-color="#4ade80" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#6f93ff" stop-opacity="0.9"/>
      <stop offset="78%" stop-color="#a9c0ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#a9c0ff" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="haloGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd166" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffd166" stop-opacity="0"/>
    </radialGradient>

    <clipPath id="circleClip">
      <circle cx="128" cy="128" r="120"/>
    </clipPath>
  </defs>

  <!-- outer badge ring -->
  <circle cx="128" cy="128" r="124" fill="none" stroke="#6f93ff" stroke-opacity="0.35" stroke-width="2"/>

  <!-- background -->
  <circle cx="128" cy="128" r="120" fill="url(#bgGlow)"/>

  <g clip-path="url(#circleClip)">
    <!-- stars -->
    <g fill="#ffffff">
      <circle cx="58" cy="56" r="1.6" opacity="0.8"/>
      <circle cx="190" cy="48" r="1.3" opacity="0.6"/>
      <circle cx="210" cy="86" r="1.8" opacity="0.7"/>
      <circle cx="40" cy="100" r="1.2" opacity="0.5"/>
      <circle cx="172" cy="44" r="1" opacity="0.5"/>
      <circle cx="76" cy="40" r="1" opacity="0.45"/>
    </g>

    <!-- aurora bands sweeping behind the sun/moon -->
    <g opacity="0.9">
      <path d="M -10 96 Q 64 56, 128 92 T 266 84" fill="none" stroke="url(#auroraGrad)" stroke-width="22" stroke-linecap="round"/>
      <path d="M -10 112 Q 64 78, 128 110 T 266 102" fill="none" stroke="url(#auroraGrad)" stroke-width="12" stroke-linecap="round" opacity="0.8"/>
    </g>

    <!-- sun glow halo -->
    <circle cx="158" cy="118" r="58" fill="url(#haloGlow)"/>

    <!-- moon (waning crescent), upper-left -->
    <g>
      <circle cx="100" cy="118" r="46" fill="url(#moonGrad)"/>
      <circle cx="120" cy="104" r="40" fill="#0d1224"/>
    </g>

    <!-- sun, lower-right, overlapping moon edge -->
    <g>
      <circle cx="158" cy="150" r="34" fill="url(#sunGrad)"/>
      <g stroke="#ffd166" stroke-width="5" stroke-linecap="round">
        <line x1="158" y1="96" x2="158" y2="84"/>
        <line x1="158" y1="204" x2="158" y2="216"/>
        <line x1="104" y1="150" x2="92" y2="150"/>
        <line x1="212" y1="150" x2="224" y2="150"/>
        <line x1="121" y1="113" x2="112" y2="104"/>
        <line x1="195" y1="187" x2="204" y2="196"/>
        <line x1="195" y1="113" x2="204" y2="104"/>
        <line x1="121" y1="187" x2="112" y2="196"/>
      </g>
    </g>

    <!-- horizon line -->
    <rect x="0" y="204" width="256" height="44" fill="#07090f" opacity="0.55"/>
  </g>
</svg>
